name: Build Release Artifacts

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: ./scripts/build_windows.ps1
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: hobo-rpg-save-editor-exe
          path: dist/hobo-rpg-save-editor.exe

  build-dist:
    name: Build Wheel and Sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: hobo-rpg-save-editor-dist
          path: dist/

  release:
    name: Publish GitHub Release
    needs: [build-exe, build-dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "$RELEASE_TAG" --generate-notes
          fi
